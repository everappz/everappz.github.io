<div class="hx:relative hx:overflow-hidden hx:rounded-xl hx:my-12 hx:border hx:border-gray-200 hx:dark:border-neutral-800" style="height: 600px;">
  <div id="commentsContainer-{{ .Get "apps" | urlize }}" class="hx:flex hx:flex-col hx:gap-4 hx:px-4 hx:py-6 hx:overflow-hidden hx:text-sm hx:leading-relaxed hx:text-gray-800 hx:dark:text-gray-100">
    <!-- Reviews will be injected here -->
  </div>
</div>

<script>
(function(){
  const appIds = "{{ .Get "apps" }}".split(',').map(id => id.trim());
  const minStars = "{{ .Get "stars" }}".split(',').map(Number);
  const scrollSpeed = 0.5;
  const containerId = "commentsContainer-{{ .Get "apps" | urlize }}";
  const container = document.getElementById(containerId);
  const BATCH_SIZE = 20;

  // Merged review pool: sorted by date, deduplicated
  let reviewPool = [];
  let renderIndex = 0;
  let isLoading = false;
  let poolReady = false;

  // Per-app RSS pagination state
  const rssPages = {};
  const rssExhausted = {};
  appIds.forEach(id => { rssPages[id] = 1; rssExhausted[id] = false; });

  // Cached reviews (loaded once per app)
  const cachedReviews = {};
  let cachedLoaded = false;

  function generateStars(rating) {
    return '★'.repeat(rating) + '☆'.repeat(5 - rating);
  }

  function renderComment(r) {
    const div = document.createElement('div');

    div.className = [
      "hextra-card",
      "hx:group",
      "hx:flex",
      "hx:flex-col",
      "hx:justify-start",
      "hx:overflow-hidden",
      "hx:rounded-lg",
      "hx:border",
      "hx:border-gray-200",
      "hx:text-current",
      "hx:no-underline",
      "hx:dark:shadow-none",
      "hx:hover:shadow-gray-100",
      "hx:dark:hover:shadow-none",
      "hx:shadow-gray-100",
      "hx:active:shadow-sm",
      "hx:active:shadow-gray-200",
      "hx:transition-all",
      "hx:duration-200",
      "hx:hover:border-gray-300",
      "hx:bg-transparent",
      "hx:shadow-xs",
      "hx:dark:border-neutral-800",
      "hx:hover:bg-slate-50",
      "hx:hover:shadow-md",
      "hx:dark:hover:border-neutral-700",
      "hx:dark:hover:bg-neutral-900",
      "hx:p-4"
    ].join(' ');

    div.innerHTML = `
      <span class="hx:flex hx:items-center hx:gap-2 hx:font-semibold hx:text-gray-700 hx:dark:text-neutral-200">
        ${r.author}
      </span>
      <div class="hx:mt-1 hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">
        ${generateStars(r.rating)}
      </div>
      <div class="hx:mt-1 hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">
        ${new Date(r.date).toLocaleDateString()}
      </div>
      <div class="hx:mt-2 hx:text-sm hx:text-gray-600 hx:dark:text-gray-300">
        ${r.content}
      </div>
    `;
    container.appendChild(div);
  }

  // Render next batch from the pool
  function renderBatch() {
    const end = Math.min(renderIndex + BATCH_SIZE, reviewPool.length);
    for (let i = renderIndex; i < end; i++) {
      renderComment(reviewPool[i]);
    }
    renderIndex = end;
  }

  // Normalize RSS entry to common format
  function normalizeRSS(entry) {
    return {
      id: entry.id.label,
      author: entry.author.name.label,
      rating: parseInt(entry['im:rating'].label, 10),
      content: entry.content.label,
      date: entry.updated.label,
    };
  }

  // Fetch one RSS page for one app
  async function fetchRSSPage(appId) {
    if (rssExhausted[appId]) return [];
    const page = rssPages[appId];
    if (page > 10) { rssExhausted[appId] = true; return []; }
    try {
      const url = `https://itunes.apple.com/us/rss/customerreviews/page=${page}/id=${appId}/sortby=mostrecent/json`;
      const res = await fetch(url);
      const data = await res.json();
      let entries = data.feed.entry || [];
      if (!Array.isArray(entries)) entries = [entries];
      const reviews = [];
      for (const e of entries) {
        try {
          if ('im:rating' in e) reviews.push(normalizeRSS(e));
        } catch { /* skip malformed entry */ }
      }
      rssPages[appId] = page + 1;
      if (reviews.length === 0) rssExhausted[appId] = true;
      return reviews;
    } catch {
      rssExhausted[appId] = true;
      return [];
    }
  }

  // Load cached reviews (once)
  async function loadCachedReviews() {
    if (cachedLoaded) return;
    cachedLoaded = true;
    await Promise.all(appIds.map(async (appId) => {
      try {
        const url = `/reviews/sorted/${appId}.json`;
        const res = await fetch(url);
        if (!res.ok) { cachedReviews[appId] = []; return; }
        cachedReviews[appId] = await res.json();
      } catch { cachedReviews[appId] = []; }
    }));
  }

  // Merge new reviews into the pool, deduplicate, re-sort
  function mergeIntoPool(newReviews) {
    const seen = new Set(reviewPool.map(r => String(r.id)));
    let added = 0;
    for (const r of newReviews) {
      const rid = String(r.id);
      if (!seen.has(rid) && minStars.includes(r.rating)) {
        seen.add(rid);
        reviewPool.push(r);
        added++;
      }
    }
    if (added > 0) {
      reviewPool.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
    return added;
  }

  // Load more reviews: fetch next RSS page for each app, merge with cache
  async function loadMore() {
    if (isLoading) return;
    isLoading = true;

    // Load cached reviews on first call
    await loadCachedReviews();

    // Fetch next RSS page for each app in parallel
    const rssResults = await Promise.all(appIds.map(fetchRSSPage));
    const allNew = rssResults.flat();

    // On first load, also merge cached reviews
    if (renderIndex === 0) {
      for (const appId of appIds) {
        allNew.push(...(cachedReviews[appId] || []));
      }
    }

    mergeIntoPool(allNew);
    renderBatch();

    isLoading = false;
  }

  function startScroll() {
    let pos = 0;
    function scroll() {
      pos += scrollSpeed;
      // When approaching the end of rendered content, load more
      if (pos >= container.scrollHeight - 800 && renderIndex < reviewPool.length) {
        renderBatch();
      }
      if (pos >= container.scrollHeight - 400) pos = 0;
      container.style.transform = `translateY(-${pos}px)`;
      requestAnimationFrame(scroll);
    }
    scroll();
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadMore();
    startScroll();
    // Periodically fetch more RSS pages to grow the pool
    setInterval(loadMore, 20000);
  });
})();
</script>
