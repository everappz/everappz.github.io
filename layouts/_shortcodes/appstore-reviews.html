<div class="hx:relative hx:overflow-hidden hx:rounded-xl hx:my-12 hx:border hx:border-gray-200 hx:dark:border-neutral-800" style="height: 600px;">
  <div id="commentsContainer-{{ .Get "apps" | urlize }}" class="hx:flex hx:flex-col hx:gap-4 hx:px-4 hx:py-6 hx:overflow-hidden hx:text-sm hx:leading-relaxed hx:text-gray-800 hx:dark:text-gray-100">
    <!-- Reviews will be injected here -->
  </div>
</div>

<script>
(function(){
  const appIds = "{{ .Get "apps" }}".split(',').map(id => id.trim());
  const minStars = "{{ .Get "stars" }}".split(',').map(Number);
  const scrollSpeed = 0.5;
  const containerId = "commentsContainer-{{ .Get "apps" | urlize }}";
  const container = document.getElementById(containerId);
  let currentAppIndex = 0;
  let currentPage = 1;
  let isLoading = false;
  let usedCachedFallback = {};

  function generateStars(rating) {
    return '★'.repeat(rating) + '☆'.repeat(5 - rating);
  }

  function renderComment(author, rating, date, content) {
    const div = document.createElement('div');

    div.className = [
      "hextra-card",
      "hx:group",
      "hx:flex",
      "hx:flex-col",
      "hx:justify-start",
      "hx:overflow-hidden",
      "hx:rounded-lg",
      "hx:border",
      "hx:border-gray-200",
      "hx:text-current",
      "hx:no-underline",
      "hx:dark:shadow-none",
      "hx:hover:shadow-gray-100",
      "hx:dark:hover:shadow-none",
      "hx:shadow-gray-100",
      "hx:active:shadow-sm",
      "hx:active:shadow-gray-200",
      "hx:transition-all",
      "hx:duration-200",
      "hx:hover:border-gray-300",
      "hx:bg-transparent",
      "hx:shadow-xs",
      "hx:dark:border-neutral-800",
      "hx:hover:bg-slate-50",
      "hx:hover:shadow-md",
      "hx:dark:hover:border-neutral-700",
      "hx:dark:hover:bg-neutral-900",
      "hx:p-4"
    ].join(' ');

    div.innerHTML = `
      <span class="hx:flex hx:items-center hx:gap-2 hx:font-semibold hx:text-gray-700 hx:dark:text-neutral-200">
        ${author}
      </span>
      <div class="hx:mt-1 hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">
        ${generateStars(rating)}
      </div>
      <div class="hx:mt-1 hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">
        ${new Date(date).toLocaleDateString()}
      </div>
      <div class="hx:mt-2 hx:text-sm hx:text-gray-600 hx:dark:text-gray-300">
        ${content}
      </div>
    `;
    container.appendChild(div);
  }

  // --- RSS feed (original method) ---
  async function fetchFromRSS(appId, page) {
    const url = `https://itunes.apple.com/us/rss/customerreviews/page=${page}/id=${appId}/sortby=mostrecent/json`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const entries = data.feed.entry || [];
      return entries.filter(c => minStars.includes(parseInt(c['im:rating'].label, 10)));
    } catch {
      return [];
    }
  }

  // --- Cached JSON fallback ---
  async function fetchFromCache(appId) {
    const url = `{{ site.BaseURL | default "/" }}reviews/sorted/${appId}.json`;
    try {
      const res = await fetch(url);
      if (!res.ok) return [];
      const reviews = await res.json();
      return reviews.filter(r => minStars.includes(r.rating));
    } catch {
      return [];
    }
  }

  async function loadComments() {
    if (isLoading) return;
    isLoading = true;
    const appId = appIds[currentAppIndex];

    // Try RSS first
    const rssComments = await fetchFromRSS(appId, currentPage++);
    if (rssComments.length > 0) {
      rssComments.forEach(c => {
        const rating = parseInt(c['im:rating'].label, 10);
        renderComment(
          c.author.name.label,
          rating,
          c.updated.label,
          c.content.label
        );
      });
    }

    // If RSS returned nothing and we haven't used cache for this app yet, load from cache
    if (rssComments.length === 0 && !usedCachedFallback[appId]) {
      usedCachedFallback[appId] = true;
      const cachedComments = await fetchFromCache(appId);
      cachedComments.forEach(c => {
        renderComment(c.author, c.rating, c.date, c.content);
      });
    }

    if (rssComments.length < 10) {
      currentPage = 1;
      currentAppIndex = (currentAppIndex + 1) % appIds.length;
    }
    isLoading = false;
  }

  function startScroll() {
    let pos = 0;
    function scroll() {
      pos += scrollSpeed;
      if (pos >= container.scrollHeight - 400) pos = 0;
      container.style.transform = `translateY(-${pos}px)`;
      requestAnimationFrame(scroll);
    }
    scroll();
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadComments();
    startScroll();
    setInterval(loadComments, 20000);
  });
})();
</script>
