{{- /*
Falling stars animated background using canvas.

Theme-aware: white stars on dark, faint black on light.
Exposes global `speedMultiplier` variable for external control (e.g. rocket animation).

@example {{< stars-background >}}
*/ -}}

<style>
  #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
</style>

<canvas id="stars"></canvas>

<script>
  if (typeof window.speedMultiplier === "undefined") {
    window.speedMultiplier = 1;
  }

  (function() {
    var canvas = document.getElementById("stars");
    var ctx = canvas.getContext("2d");
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;

    var stars = Array.from({ length: 200 }, function() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        radius: Math.random() * 1.5,
        velocity: Math.random() * 0.2 + 0.05
      };
    });

    function getStarColor() {
      return document.documentElement.classList.contains("dark")
        ? "rgba(255,255,255,0.3)"
        : "rgba(0,0,0,0.2)";
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = getStarColor();
      for (var i = 0; i < stars.length; i++) {
        var star = stars[i];
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
        star.y += star.velocity * window.speedMultiplier;
        if (star.y > h) {
          star.y = 0;
          star.x = Math.random() * w;
        }
      }
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener("resize", function() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
    });

    var observer = new MutationObserver(function() { animate(); });
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["class"]
    });
  })();
</script>
