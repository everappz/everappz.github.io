{{ if .IsHome }}

  <!-- Evervideo Promo -->
  <meta name="apple-itunes-app" content="app-id=6602897336">

{{ end }}

{{- if .IsTranslated -}}
  {{- range .AllTranslations }}
  <link rel="alternate" hreflang="{{ .Language.LanguageCode }}" href="{{ .Permalink }}" />
  {{- end }}
  {{- with index (where .AllTranslations "Language.Lang" "en") 0 }}
  <link rel="alternate" hreflang="x-default" href="{{ .Permalink }}" />
  {{- end }}
{{- end -}}
