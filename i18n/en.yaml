# FAQ
flacboxFAQ1Title: "How does Flacbox work?"
flacboxFAQ1Content: |
  Flacbox is a hi-res music player that lets you manage audio tracks like regular files.<br>
  You can upload your entire music collection to cloud services like Dropbox, Google Drive, or a personal NAS and play music directly from the cloud with full control.<br><br>
  No iTunes sync is needed—just upload from your PC or Mac like you do with any file.<br>
  To listen offline, use the built-in download manager to save music to your device.<br><br>
  Explore our how-to guides for more details:<br>
  - <a href="/docs/guide/flacbox/flacbox-guide">Flacbox guide</a><br>
  - <a href="/docs/howto/how-to-listen-to-music-from-icloud-drive-on-your-iphone-or-mac">How to play music from iCloud Drive on my iPhone or Mac.</a><br>
  - <a href="/docs/howto/how-to-enable-dlna-media-server-on-windows-10-and-play-your-music-on-iphone">How To Enable DLNA Media Server on Windows 10 and Play Your Music on iPhone.</a><br>
  - <a href="/docs/howto/how-to-upload-my-files-to-the-cloud-storage-and-connect-them-to-evermusic-flacbox-evertag">How to upload my files to the cloud storage and connect them to Evermusic, Flacbox, Evertag.</a><br>
  - <a href="/docs/howto/how-to-transfer-files-wirelessly-from-a-computer-to-an-iphone-using-wifi-drive">How to transfer files wirelessly from a computer to an iPhone using WiFi-Drive.</a><br>
  - <a href="/docs/howto/how-to-connect-a-usb-flashcard-to-the-iphone-and-listen-to-music-or-manage-files-located-on-it">How to connect a USB flashcard to the iPhone and listen to music or manage files located on it.</a><br>
  - <a href="/docs/howto/how-to-play-music-on-iphone-from-wd-my-cloud-home">How to play music on iPhone from WD My Cloud Home.</a>
flacboxFAQ2Title: "Is Flacbox Free?"
flacboxFAQ2Content: |
  Flacbox is free to use with some limitations, which can be removed by upgrading to the Premium version.<br>
  You can choose between a one-time lifetime purchase or two subscription options (monthly or yearly). Prices may vary based on your region.<br><br>
  Family Sharing is enabled for all plans, so you can share the Premium version with your family members.<br><br>
  Premium purchases and subscriptions are shared across iOS and Mac via iCloud. To sync your purchase, make sure iCloud is enabled, open the app on your iOS device, and wait a minute for sync to complete.<br><br>
  <a href="/docs/faq/flacbox/what-is-the-difference-between-flacbox-and-flacbox-premium/">Read more about the differences between Flacbox and Flacbox Premium</a>
flacboxFAQ3Title: "What is the difference between Flacbox and Evermusic?"
flacboxFAQ3Content: |
  <strong>Flacbox</strong> is built to support all default iOS audio formats along with many additional formats not natively supported on iPhone, such as WMA, OGG, M4A, DSD, and more.<br>
  It uses a custom audio engine to handle nearly all formats and offers features like adjustable audio output sample rate and pitch correction.<br><br>
  <strong>Evermusic</strong>, on the other hand, supports default audio formats and includes advanced features like crossfade playback, gapless playback, audio equalizer, playback speed control, and more.<br><br>
  If you mainly use MP3, ALAC, or FLAC, <strong>Evermusic</strong> may be the better option for its playback features.<br>
  If you need broad compatibility with various audio file types, <strong>Flacbox</strong> is the right choice.<br><br>
  <a href="/docs/faq/evermusic/what-is-the-difference-between-evermusic-and-flacbox/">Learn more about the differences between Flacbox and Evermusic</a>
flacboxFAQ4Title: "How do I sync Flacbox?"
flacboxFAQ4Content: |
  <strong>Metadata Synchronization</strong><br>
  When you add tracks to your library, a background metadata reader scans your files and organizes them by Artist, Album, Genre, and Composer.<br>
  You can adjust the scan speed for faster loading, though it may increase energy use. You can also disable it entirely to show only file names instead of tags.<br><br>
  The metadata reader <strong>does not modify</strong> your original audio files in the cloud or local storage. If you want to edit tags, use the built-in tags editor from the file's options menu.<br><br>
  If background sync is enabled, the metadata reader will continue running even when the app is in the background, but keep in mind that iOS may suspend it if it consumes too much energy.<br>
  For large libraries, it's recommended to sync metadata on the desktop version and use the <strong>data backup &amp; restore</strong> feature to transfer it to your mobile device.<br><br>
  Use the <strong>'Reload metadata'</strong> action to force a full metadata refresh across your library.<br><br>
  <strong>Online Music Synchronization</strong><br>
  Online sync lets you add music from cloud storage to your library automatically.<br>
  Go to <strong>Music Library Settings → Sync folders</strong>, select the folders to scan, and the app will find and add supported audio files.<br><br>
  Online sync works <strong>only when the app is active</strong>, so it's best to leave the app open, connected to power, and enable <strong>"Always active screen"</strong> in settings for faster syncing.<br>
  You can also do this on desktop and then transfer the library to mobile using backup &amp; restore.<br>
  Sync frequency can be configured (e.g. "immediately" starts sync each time the app opens).<br><br>
  <strong>Offline Music Synchronization</strong><br>
  This scans all folders inside the app's <strong>Documents</strong> directory and adds supported local files to the music library.<br>
  Files outside the app's sandbox (due to iOS/macOS security) must be added manually.<br>
  Run offline sync periodically to keep the library up-to-date with your local files.<br><br>
  <strong>Offline Folders</strong><br>
  Enabling offline mode for any album, artist, genre, playlist, or remote folder downloads all files inside that group for offline access.<br>
  They are stored under the <strong>Offline Folders</strong> section.<br><br>
  New files added to the same remote folder will be automatically downloaded.<br>
  To <strong>manually resync</strong>, tap the three-dot menu and choose <strong>"Synchronize"</strong>.<br><br>
  You can also customize <strong>sync timeout intervals</strong> in settings for more control over sync behavior and ensure your offline music stays updated.<br><br>
  <a href="/docs/guide/flacbox/flacbox-guide-music-library">Read more</a>
flacboxFAQ5Title: "How do I use Flacbox?"
flacboxFAQ5Content: |
  <strong>Install Flacbox</strong><br>
  Download and install the Flacbox app from your device's app store. It's available for both iOS and Mac devices.<br><br>
  <strong>Open the App</strong><br>
  Launch Flacbox by tapping its icon on your device's home screen.<br><br>
  <strong>Connect Your Cloud Service</strong><br>
  • Open the <strong>Connections</strong> tab.<br>
  • Select <strong>Connect a cloud service</strong> from the menu.<br>
  • Choose your desired cloud service from the list.<br>
  • Enter your credentials and tap <strong>Done</strong>.<br><br>
  <strong>Import Files Located On Your Device</strong><br>
  You can import files from your device, an external USB flash drive, a personal computer, or a NAS.<br>
  • Open the <strong>Local files</strong> tab.<br>
  • Tap <strong>Open files...</strong> or <strong>Open folders...</strong> from the <strong>Files on this device</strong> menu.<br>
  • Choose files or folders located on your device.<br>
  • Tap <strong>Open</strong> to import files to the app.<br><br>
  <strong>Add Your Music</strong><br>
  You have two options to add music to Flacbox: manual addition or automatic synchronization.<br><br>
  <strong>Manual Addition</strong><br>
  • Tap on the <strong>Add music</strong> or similar menu item.<br>
  • Select folders/files from your connected cloud services or local files.<br>
  • Flacbox creates links to your tracks, preserving the original files' locations.<br>
  • To make tracks available offline, use the built-in download manager or enable offline mode.<br><br>
  <strong>Automatic Synchronization</strong><br>
  • Go to the <strong>Music Library settings</strong>.<br>
  • Select <strong>Sync folders</strong> to enable automatic synchronization.<br>
  • The app scans selected folders, identifies audio files, and integrates them into your library.<br><br>
  <strong>Explore Your Music Library</strong><br>
  • Organized by source types and music tags.<br>
  • Sections: Online music, Offline music, Local files, etc.<br>
  • Categories: Songs, Albums, Artists, Genres, Composers.<br>
  • Use <strong>Search</strong> to find tracks quickly.<br><br>
  <strong>Customize Your Settings</strong><br>
  • Tap the three dots button to access <strong>More actions</strong> and <strong>Settings</strong>.<br>
  • Adjust metadata sync, personalization, album cover preferences, playlists, recents, and favorites.<br><br>
  <strong>Enjoy Your Music</strong><br>
  Once your music is organized, use the top toolbar for quick actions like <strong>Search</strong>, <strong>Play All</strong>, <strong>Shuffle</strong>, and <strong>Continue Playback</strong>.<br><br>
  <strong>Learn More</strong><br>
  Explore in-app tutorials or visit these guides:<br><br>
  • <a href="/docs/guide/flacbox/flacbox-guide">Flacbox Guide</a><br>
  • <a href="/docs/howto/how-to-upload-my-files-to-the-cloud-storage-and-connect-them-to-evermusic-flacbox-evertag">Upload files to cloud and connect to Flacbox</a><br>
  • <a href="/docs/howto/how-to-listen-to-audiobooks-on-iphone-ipad-mac-using-evermusic">Listen to Audiobooks</a><br>
  • <a href="/docs/howto/how-to-play-local-music-stored-on-your-iphone-or-mac">Play Local Music on iPhone or Mac</a><br>
  • <a href="/docs/howto/how-to-listen-to-music-from-icloud-drive-on-your-iphone-or-mac">Play from iCloud Drive</a><br>
  • <a href="/docs/howto/how-to-use-the-audio-equalizer-on-your-iphone-ipad-mac-with-evermusic-and-flacbox">Use the Audio Equalizer</a><br>
  • <a href="/docs/howto/how-to-connect-a-usb-flashcard-to-the-iphone-and-listen-to-music-or-manage-files-located-on-it">Connect USB Flashcard</a><br>
  • <a href="/docs/howto/how-to-transfer-files-wirelessly-from-a-computer-to-an-iphone-using-wifi-drive">WiFi-Drive Wireless Transfer</a>
flacboxFAQ6Title: "Is Flacbox Safe?"
flacboxFAQ6Content: |
  Flacbox uses only official SDK and secure connections to interact with connected cloud services. Your login and password are not available for the application. All requests from the application to the cloud service are encrypted.<br>
  When you enter login and password the application shows you the official authorization page that is provided by the cloud service provider and all authorization process is made outside the application. The cloud service provider sends an auth-token to the application after successful authorization and that token is used to make API calls.<br><br>
  Auth-token is a digital key that allows third-party applications to interact with cloud storage. Auth-token is stored on your device in secure system storage called Keychain. You can download your files from the connected cloud service to the device and those files will be placed in the app "Documents" directory. You can remove that files anytime using the built-in file manager.<br>
  The application does not share any information from the connected cloud account. You can revoke access to your cloud account anytime by opening the account settings page on your web browser.<br><br>
  To reject auth-token login to your account on the web browser and navigate to the settings page. There you can find all third-party apps which are connected to your cloud account and remove any of them if you don't want to use that application anymore.<br><br>
  You can also disconnect the connected cloud accounts in the application and auth-token will be also removed from your device. If you remove the application from your device all downloaded data and access tokens will be also removed.<br><br>
  <a href="/docs/guide/flacbox/flacbox-guide-connections">Read more</a>
flacboxFAQ7Title: "How do I make a playlist on Flacbox?"
flacboxFAQ7Content: |
  - Open the Playlists section.<br>
  - Tap the "+" button or the "..." button in the top right corner and select "New Playlist."<br>
  - Enter a name for the playlist and tap "Save." The "Add Songs" dialog will appear.<br>
  - Select the tracks you want to add to the playlist.<br><br>
  <a href="/docs/guide/flacbox/flacbox-guide-playlists">Read more</a>
flacboxFAQ8Title: "What cloud services does Flacbox support?"
flacboxFAQ8Content: |
  Currently, the application supports the most popular cloud services: iCloud Drive, Google Drive, Dropbox, OneDrive, Box, MEGA, Yandex.Disk, WD MyCloud Home, DLNA, MediaFire, WebDAV, SMB, pCloud, HiDrive, My Cloud Home, InfiniCLOUD, Cloud Mail.ru, Put.io, MyDrive.<br><br>
  <a href="/docs/guide/flacbox/flacbox-guide-connections">Read more</a>
flacboxFAQ9Title: "How can I use an equalizer?"
flacboxFAQ9Content: |
  - Open the Audio Player Screen.<br>
  - Tap on the "Equalizer" icon on the bottom of the screen.<br>
  - Toggle switch control in the top right corner on the equalizer screen to activate the equalizer.<br>
  - Select one of the available presets (rock, pop, dance, disco..) or change equalizer sliders to build your own preset.<br><br>
  Full tutorial available here:<br>
  <a href="/docs/howto/how-to-use-the-audio-equalizer-on-your-iphone-ipad-mac-with-evermusic-and-flacbox">How to use the audio equalizer on your iPhone, iPad, Mac with Evermusic and Flacbox</a>
flacboxFAQ10Title: "How do I enable offline mode in Flacbox?"
flacboxFAQ10Content: |
  - Connect a Cloud Service:<br>
   • Go to the "Connections" tab.<br>
   • Select "Connect a cloud service" and follow the prompts to connect your desired service.<br><br>
  - Navigate to Music Folder:<br>
   • Open the connected cloud service and find your music folder.<br><br>
  - Enable Offline Mode:<br>
   • Tap the "More actions" button next to the folder name.<br>
   • Choose "Enable offline mode."<br><br>
  - Download Content:<br>
   • The selected folder and all its contents will be downloaded to "Local files" > "Offline folders."<br><br>
  - Automatic Updates:<br>
   • The app will continuously scan for changes. New files added to the online folder will be automatically downloaded.<br><br>
  - Configure Scanning Timeout:<br>
   • Go to "Settings" > "File manager" > "Offline folders" > "Time interval" to set the scanning frequency.<br><br>
  - Manual Synchronization:<br>
   • To sync manually, go to "Settings" > "File manager" > "Offline folders" > "Synchronized offline folders."<br>
   • Tap "More actions" and select "Start synchronization."<br><br>
  <a href="/docs/howto/play-offline-music-in-evermusic-flacbox-download-sync-from-cloud-to-local-files/">Read more</a>
flacboxFAQ11Title: "How to play locally Downloaded music on iPhone?"
flacboxFAQ11Content: |
  Once you've installed the application, open the "Local Files" screen and scroll down to the "Files on this iPhone" section. From there, choose "Open files..." if you need to select several audio files or "Open folder..." if you want to pick a music folder. The app will scan the folder's content, and all found audio files will be selected. Navigate to your music folder, tap "Open" to confirm your selection, and the files will be added to the player queue. These files will be played directly from the selected location without being copied to the application bundle.<br><br>
  <strong>Adding a Folder to Favorites for Quick Access</strong><br>
  Simplify the process by adding a folder located on your device to your favorites. This way, you won't need to repeat the steps every time you want to play music. Open the "Local Files" screen, scroll to the "Quick Access" section, and tap "Favorites" to access the "Favorite Files" screen. Tap the more actions button (three dots) in the top right corner and select "Add Folder." Navigate to your desired folder and tap "Open" to confirm. Your folder will be added to "Favorite Files," providing quick access to your music.<br><br>
  <strong>Importing Local Files to the Music Library</strong><br>
  If you prefer to organize your local files within your music library, open the "Music Library" screen, tap the three dots button at the top right corner, and select "+ Add Music." Choose the "Local Files" menu item, scroll down to the "Files on this iPhone" section, and tap "Open Files...". Select the files you want to add and tap "Open" to confirm. The app will scan the selected files and add them to your music library, organizing them by metadata such as artist, album, and genre.<br><br>
  <strong>Adding Local Files to a Playlist</strong><br>
  To add local files to a playlist, open the "Playlists" screen and tap the more button in the top right corner. Select "+ New Playlist," enter a name for your new playlist, and on the next screen, select the "Local Files" option. Scroll down to the "Files on this iPhone" section and tap "Open Files...". Select the audio files you want to add and tap "Open" to confirm. The files will be added to your playlist, where you can change the song order and perform other actions using the more button.<br><br>
  With these simple steps, you can unlock the full potential of your iPhone and Mac as the ultimate platforms for enjoying your cherished local music collection.<br><br>
  <a href="/docs/howto/how-to-play-local-music-stored-on-your-iphone-or-mac">Read more</a>
flacboxFAQ12Title: "How can I resume a playlist from where I left off?"
flacboxFAQ12Content: "First, ensure \"Save Audio Player State\" is enabled in Settings > Audio Player > General. When you switch to another playlist and return, you will see four actions on the top toolbar under the album artwork: \"Search,\" \"Continue Playback,\" \"Play All,\" and \"Shuffle All.\" Tap \"Continue Playback\" to resume the playlist from the last saved state and media position."
flacboxFAQ13Title: "How to view lyrics for songs in Flacbox?"
flacboxFAQ13Content: |
  You can view embedded lyrics for tracks in the app by <strong>following these steps</strong>:<br>
  1. Start playing an audio file by tapping on it.<br>
  2. Open the full-screen audio player.<br>
  3. Tap the "More Actions" button in the top right corner to see the more actions menu.<br>
  4. Select the "View Comments" menu item.<br>
  5. On the track comments screen, you have three modes which you can change by scrolling to the right: Comments, Embedded Lyrics, and LRC File.<br><br>
  <strong>Modes</strong>:<br>
  1. Comments Mode: Displays the content from the COMMENT field of your audio file.<br>
  2. Lyrics Mode: Shows the embedded lyrics from your audio file. If your audio file has lyrics in the tags, they will appear here. This mode also supports timed text in LRC format. To edit the lyrics tag, use an external audio tag editor like Evertag. You can find LRC format lyrics for free on websites like Lyricsify. Copy the needed lyrics to your tags and save them to display later on this screen.<br>
  3. LRC File Mode: Instead of editing audio files, you can place an LRC file in the same folder as the original audio file. Both files should have the same name but different extensions. When you swipe to the third page on the Comments screen, the app will search for the LRC file in the same directory and display its content.<br><br>
  <a href="/docs/howto/how-to-add-and-view-comments-to-your-audio-tracks-on-iphone-ipad-and-mac-with-evermusic-and-flacbox">Read more</a>
flacboxFAQ14Title: "How do I transfer music to Flacbox from my computer?"
flacboxFAQ14Content: |
  You can connect your computer or personal NAS using SMB, WebDAV, or DLNA protocols. Alternatively, use iTunes File Sharing to transfer music.<br><br>
  To connect a computer using SMB protocol tap "Connect a cloud service" → SMB. Enter computer IP address and shared folder name in URL field using format smb://computer-ip-address/shared-folder-name, enter login and password and tap "Done". If your connection is successful you will see connected storage in the "Cloud services" section.<br><br>
  A full tutorial available here:<br>
  <a href="/docs/howto/transfer-your-files-from-the-computer-to-iphone-using-smb-protocol/">Transfer your files from the computer to iPhone using SMB protocol</a><br><br>
  For WebDAV protocol, all steps are the same instead of the URL field. URL should be in format http://server-name or https://server-name if the server supports SSL.<br><br>
  Wi-Fi Drive is a popular technology that allows you to transfer files from your computer to an iOS device wirelessly using a desktop browser. To use this feature your device and computer should be connected to the same Wi-Fi network. Open "Connections" → "Computer" → "Connect using Wi-Fi" and enable the server. After this open a desktop browser and enter the URL from the application. You can drag-n-drop files from your computer to the opened web page and they will appear on the device.<br>
  More detailed tutorial available here:<br>
  <a href="/docs/howto/how-to-transfer-files-wirelessly-from-a-computer-to-an-iphone-using-wifi-drive">How to transfer files wirelessly from a computer to an iPhone using WiFi-Drive</a><br><br>
  iTunes File Sharing is another technology that allows you to transfer files from computer to device using iTunes and lightning cable. Just connect a device to the computer using a cable and run iTunes. Open the iTunes → "Applications section" → and find Evermusic. Tap on the app icon to see a shared folder. Copy files from the computer to the shared folder on the device.<br><br>
  Detailed instruction available here:<br>
  <a href="/docs/howto/how-to-play-local-itunes-files-on-my-iphone">How to play local files (iTunes files) on my iPhone</a><br><br>
  DLNA You can also setup DLNA media server and stream your music from Window PC as described here:<br>
  <a href="/docs/howto/how-to-enable-dlna-media-server-on-windows-10-and-play-your-music-on-iphone">How To Enable DLNA Media Server on Windows 10 and Play Your Music on iPhone</a>
flacboxFAQ15Title: "How to download music?"
flacboxFAQ15Content: |
  Before you can download music and listen to your music offline you should connect network account.<br>
  Just open the "Connections" screen and add your account.<br>
  Once you added a network account you can download your music from the cloud.<br><br>
  <strong>To download music from the cloud</strong><br>
  – Open connected cloud service.<br>
  – Navigate inside the folder you want to download.<br>
  – Tap on the more actions button "..." in the top right corner and choose the "Select" menu item.<br>
  – Select files you want to download and tap on the "Download" button.<br><br>
  <strong>To enable offline mode for Artist/Playlist/Album/Genre</strong><br>
  – Open Artists/Albums/Playlists/Genre Screen<br>
  – Tap the "Offline mode" checkbox<br>
  – Offline Artist/Album/Playlist/Genre will appear in the "Offline music" section of the music library<br><br>
  More detailed instruction about offline mode available here:<br>
  <a href="/docs/howto/play-offline-music-in-evermusic-flacbox-download-sync-from-cloud-to-local-files/">Play Offline Music in Evermusic &amp; Flacbox: Download &amp; Sync from Cloud to Local Files</a><br><br>
  Another available option is download music from cloud services and import it in Evermusic as described here:<br>
  <a href="/docs/howto/how-to-download-music-from-youtube-and-listen-to-offline-music-on-iphone">How to Download Music From YouTube and Listen to Offline Music on iPhone</a>
flacboxFAQ16Title: "What audio formats does Flacbox support?"
flacboxFAQ16Content: |
  This app supports default <strong>system audio codecs</strong> and additional <strong>ffmpeg software codecs</strong>:<br><br>
  3g2, 3gp, 3gp2, 3gpp, 8svx, aa, aac, aax, ac3, act, adt, adts, aif, aifc, aiff, alac, amr, amv, ape, asf, au, avi, awb, caf, cavs, cdda, cue, dct, dff, drc, dsf, dss, dvf, "dvr-ms", ec3, f4a, f4b, f4p, f4v, flac, flv, gif, gifv, gsm, gxf, h261, h263, h264, ifv, iklax, ivf, ivs, l16, latm, loas, m2t, m2ts, m2v, m3u, m3u8, m4a, m4b, m4p, m4r, m4v, mka, mkv, mmf, mng, mod, mogg, mov, mp1, mp2, mp3, mp4, mp4v, mpa, mpc, mpe, mpeg, mpg, mpv, msv, mts, mxf, nsf, nsv, nut, oga, ogg, ogv, opus, pcm, pls, qt, ra, raw, rm, rmvb, roq, rv, sln, snd, svi, tod, tta, vob, voc, vox, vtt, w64, wav, wave, webm, wma, wmv, wv, xhe, xmv, y4m, yuv.
flacboxFAQ17Title: "Can I use Flacbox to play audiobooks?"
flacboxFAQ17Content: |
  Yes, Flacbox can be used as a powerful audiobook player.<br><br>
  <strong>How to Add Audiobooks</strong><br>
  • For <strong>local files</strong>, connect your iPhone or iPad to your computer, open iTunes (or Finder on macOS Catalina or later), and drag your audiobook files into the "Flacbox" section.<br>
  • For <strong>cloud files</strong>, connect services like iCloud Drive, Google Drive, Dropbox, and others inside the Flacbox app to access your audiobooks remotely.<br><br>
  <strong>Playback Features</strong><br>
  • Navigate to your audiobooks via <strong>Music Library</strong> or <strong>Local Files</strong>.<br>
  • Flacbox supports <strong>play, pause, skip</strong>, and <strong>adjustable playback speed</strong>.<br>
  • You can enable <strong>Skip Time</strong> buttons in settings for quick navigation.<br>
  • Create <strong>Audio bookmarks</strong> to save your place.<br>
  • Use <strong>Continue Playback</strong> to resume from where you left off.<br><br>
  <strong>Organization and Offline Access</strong><br>
  • Organize audiobooks into playlists by <strong>genre</strong>, <strong>author</strong>, or <strong>series</strong>.<br>
  • Download audiobooks for <strong>offline listening</strong>, perfect for travel or limited connectivity.<br><br>
  Flacbox provides a full-featured solution for audiobook lovers on iPhone, iPad, and Mac.<br><br>
  <a href="/docs/howto/how-to-listen-to-audiobooks-on-iphone-ipad-mac-using-evermusic">Read more</a>
flacboxFAQ18Title: "Does Flacbox work with NAS devices?"
flacboxFAQ18Content: |
  Yes, Flacbox supports NAS connections using <strong>SMB</strong>, <strong>WebDAV</strong>, and <strong>DLNA</strong> protocols.<br><br>
  <strong>To connect a NAS using SMB protocol:</strong><br>
  • Tap <strong>"Connect a cloud service" → SMB</strong>.<br>
  • Enter the NAS server IP address and shared folder name in this format: <code>smb://your-ip/shared-folder</code><br>
  • Choose protocol version: <strong>Auto</strong>, <strong>SMB1</strong>, or <strong>SMB2</strong>.<br>
  • Enter your login and password (if required).<br>
  • Tap <strong>"Done"</strong>.<br><br>
  If the connection is successful, you'll see your NAS in the <strong>Cloud services</strong> section.<br>
  <a href="/docs/howto/stream-your-music-from-mac-or-pc-to-iphone-using-smb/">Read full tutorial</a><br><br>
  <strong>To connect via WebDAV protocol:</strong><br>
  • Steps are the same as SMB, but use a WebDAV URL like <code>http://your-server-name</code> or <code>https://your-server-name</code> if using SSL.<br><br>
  <strong>To stream via DLNA:</strong><br>
  • You can stream from a Windows PC by enabling its DLNA media server.<br>
  <a href="/docs/howto/how-to-enable-dlna-media-server-on-windows-10-and-play-your-music-on-iphone">Read the DLNA setup guide</a><br><br>
  <strong>Available Devices section:</strong><br>
  • Shows all discoverable NAS devices on your local network.<br>
  • Tap a device name to connect, then enter login credentials if needed.<br><br>
  <strong>Useful links:</strong><br>
  • <a href="/docs/howto/how-to-play-music-on-iphone-from-wd-my-cloud-home">How to play music on iPhone from WD My Cloud Home</a><br>
  • <a href="/docs/howto/stream-your-music-from-mac-or-pc-to-iphone-using-smb/">Stream your music from MAC or PC to iPhone using SMB</a><br>
  • <a href="/docs/howto/how-to-connect-bluesound-vault-s-internal-storage-from-the-evermusic-flacbox-evertag">Connect Bluesound Vault storage</a><br>
  • <a href="/docs/howto/how-to-connect-nas-storage-using-webdav-and-listen-to-music-on-your-iphone-or-mac">Connect NAS Storage Using WebDAV</a>
flacboxFAQ19Title: "How do I import music to Flacbox?"
flacboxFAQ19Content: |
  <strong>Connect Your Cloud Service</strong><br>
  • Open the <strong>Connections</strong> tab.<br>
  • Select <strong>Connect a cloud service</strong> from the menu.<br>
  • Choose your desired cloud service from the list.<br>
  • Enter your credentials and tap <strong>Done</strong>.<br><br>
  <strong>Import Files Located On Your Device</strong><br>
  You can import files from your device, a USB flash drive, a computer, or a NAS.<br>
  • Open the <strong>Local files</strong> tab.<br>
  • Tap <strong>Open files...</strong> or <strong>Open folders...</strong> from the <strong>Files on this device</strong> menu.<br>
  • Choose files or folders located on your device.<br>
  • Tap <strong>Open</strong> to import files to the app.<br><br>
  <strong>Add Your Music</strong><br>
  You can add music manually or automatically using sync folders.<br><br>
  <strong>Manual Addition</strong><br>
  • Tap on the <strong>Add music</strong> menu item.<br>
  • Select folders or files from connected cloud services or your device.<br>
  • Flacbox creates links to your tracks without copying them.<br>
  • To make tracks available offline, use the download manager or enable <strong>Offline mode</strong>.<br><br>
  <strong>Automatic Synchronization</strong><br>
  • Open <strong>Music Library settings</strong>.<br>
  • Select <strong>Sync folders</strong> to turn on automatic syncing.<br>
  • The app scans selected folders and adds supported audio files to your library.<br><br>
  <strong>Explore Your Music Library</strong><br>
  • Your library is organized by source (online, offline, local).<br>
  • Browse by songs, albums, artists, genres, and composers.<br>
  • Use the search bar to find any song quickly.<br><br>
  <strong>Learn More</strong><br>
  Explore these tutorials for more help:<br><br>
  • <a href="/docs/howto/how-to-upload-my-files-to-the-cloud-storage-and-connect-them-to-evermusic-flacbox-evertag">Upload files to cloud and connect them to Flacbox</a><br>
  • <a href="/docs/howto/how-to-listen-to-audiobooks-on-iphone-ipad-mac-using-evermusic">Listen to Audiobooks on iPhone, iPad, or Mac</a><br>
  • <a href="/docs/howto/how-to-play-local-music-stored-on-your-iphone-or-mac">Play Local Music Stored on Your iPhone or Mac</a><br>
  • <a href="/docs/howto/how-to-listen-to-music-from-icloud-drive-on-your-iphone-or-mac">Play Music from iCloud Drive</a><br>
  • <a href="/docs/howto/how-to-use-the-audio-equalizer-on-your-iphone-ipad-mac-with-evermusic-and-flacbox">Use the Audio Equalizer</a><br>
  • <a href="/docs/howto/how-to-connect-a-usb-flashcard-to-the-iphone-and-listen-to-music-or-manage-files-located-on-it">Connect USB Flashcard to iPhone</a><br>
  • <a href="/docs/howto/how-to-transfer-files-wirelessly-from-a-computer-to-an-iphone-using-wifi-drive">Transfer Files Wirelessly Using WiFi-Drive</a><br>
  • <a href="/docs/howto/transfer-your-files-from-the-computer-to-iphone-using-smb-protocol/">Transfer Files Using SMB Protocol</a>
flacboxFAQ20Title: "How do I use the Wi-Fi Drive feature in Flacbox?"
flacboxFAQ20Content: |
  <strong>Wireless transfer using a desktop browser</strong><br>
  1. Launch the app: Open Flacbox.<br>
  2. Connect via Wi-Fi: Go to "Connections" → "Computer" → "Connect using Wi-Fi".<br>
  3. (Optional) Add security: Enter a username and password if needed.<br>
  4. Start Wi-Fi Drive: Tap "Start Wi-Fi Drive" and copy the provided URL.<br>
  5. Open a browser (Safari, Chrome, Opera, Firefox, etc.) and enter the URL.<br>
  6. Use the built-in file manager to upload, download, rename, or delete files. You can drag and drop files directly to your iPhone.<br>
  7. When done, tap "Stop Wi-Fi Drive" on your iPhone.<br><br>
  Note: Ensure JavaScript is enabled and you're using the latest browser version for best performance.<br><br>
  <strong>Transfer files using Mac Finder</strong><br>
  1. In Finder, click "Go" → "Connect to Server…".<br>
  2. Enter the server URL shown in the Flacbox app.<br>
  3. Click "Connect" and manage files on your iPhone like any network drive.<br><br>
  <strong>Transfer files using Windows File Explorer</strong><br>
  1. Right-click "This PC" → "Map Network Drive…".<br>
  2. Enter the server URL from the Flacbox app in the "Folder" field.<br>
  3. Choose a drive letter, click "Finish", and browse your iPhone's files directly.<br><br>
  <a href="/docs/howto/how-to-transfer-files-wirelessly-from-a-computer-to-an-iphone-using-wifi-drive">Read more</a>
flacboxFAQ21Title: "Does Flacbox support Apple CarPlay?"
flacboxFAQ21Content: |
  Yes, <strong>Flacbox fully supports Apple CarPlay</strong>. You can browse your music library, play local or offline files, connect to cloud storage, and control playback directly from your car's infotainment screen.<br><br>
  The CarPlay interface includes dedicated tabs for <strong>Library</strong>, <strong>Connections</strong>, <strong>Local Files</strong>, and <strong>Settings</strong>, giving you full control over your music on the road. Playback controls, shuffle, repeat, and queue management are also available.<br><br>
  To use CarPlay, make sure Siri is enabled and your iPhone is connected via USB or wireless.<br><br>
  <a href="/docs/howto/how-to-play-your-own-music-on-iphone-using-carplay/">Read the full guide</a>

