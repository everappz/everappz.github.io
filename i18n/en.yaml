evermusicFeature3Subtitle: "Offline mode allows you to download favourite albums, tracks, genres and playlists for offline playback and listen to music, when you aren't connected to the Internet."
evermusicFeature4Title: "Your Music in the Cloud"
evermusicFeature4Subtitle: "Create your own advanced music streaming service for free! Manage your massive music library, save device storage, and stream your favorite tracks directly from the cloud with smart buffering and seamless playback. Enjoy support for popular cloud services like iCloud, Google Drive, Dropbox, MEGA.nz, Box, OneDrive, and more."
evermusicFeature5Title: "Transfer Files Easily"
evermusicFeature5Subtitle: "Connect your Mac or PC and stream music directly from your home computer. Transfer audio files seamlessly between your computer and iOS device using Wi-Fi Drive or iTunes File Sharing. You can also link your NAS or a USB flash drive and access your library from anywhere."
evermusicFeature6Title: "Automatic Sync"
evermusicFeature6Subtitle: "Sync Manager automatically scans your cloud storage for audio files and updates your music library. The Metadata Loader organizes tracks by albums, artists, and genres using embedded audio tags."

