evermusicFeature1Subtitle: "Got 100Gb of music collected by years but only 32Gb of storage on iPhone? Just move all your tracks to the cloud and free up such valuable space for photos, videos and apps."
evermusicFeature2Title: "Instant Access to Tracks"
evermusicFeature2Subtitle: "With support of the most popular cloud services Evermusic allows you to pick one or multiple services and stream your music from the cloud. No more iTunes synchronization, your audio files get uploaded to the cloud from PC or Mac just like other files."
