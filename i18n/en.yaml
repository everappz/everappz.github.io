aboutHeadingWhoWeAre: "Who We Are"
aboutWhoWeAreText: |
  Everappz S.L. is an independent software company based in Spain. We are a small, passionate team of two, dedicated to building useful, fast, and user-friendly iOS and macOS applications for audio playback, video playback, and music metadata management. Our product lineup — Evermusic, Flacbox, EverTag, and Evervideo has accumulated over 14 million downloads worldwide. Evermusic, a cloud music player supporting 12+ storage services including iCloud, Dropbox, and Google Drive, accounts for 11 million of those downloads and holds a 4.6-star rating from over 18,000 App Store reviews. Flacbox, a lossless audio player supporting FLAC, DSD, ALAC, and 120+ audio formats, surpassed 1 million downloads. All products are distributed exclusively through the Apple App Store.
aboutHeadingJourney: "Our Journey"
aboutJourneyText: |
  Our story began in 2006, developing mobile apps for popular Java (J2ME) phones of the time. In 2009, we transitioned to iOS development, working for large companies and gaining valuable experience in professional app engineering.

  Eventually, we decided to apply our knowledge and passion to our own projects — removing middle managers, unnecessary meetings, and distractions. This gave us the freedom to focus solely on what matters: making great apps.
aboutHeadingDrives: "What Drives Us"
aboutDrive1: "**Simplicity and usability.** Our apps are designed so that anyone can enjoy them — no tech skills required."
aboutDrive2: "**Customer-first mindset.** We read every user review and email, constantly improving our apps based on real feedback."
aboutDrive3: "**Performance and quality.** We care deeply about speed, stability, and useful features."
aboutDrive4: "**Purpose-driven features.** We use only time-proven technologies and practices. We avoid trendy or unnecessary features that exist solely for marketing. Instead, we implement only what's truly useful—based on customer requests and real-world use cases."
aboutDrive5: "**Accessibility matters.** We invest significant time and effort to make our apps fully accessible, including full support for VoiceOver and screen reader navigation."
aboutDrive6: "**Privacy first.** We respect your privacy by allowing you to disable all analytics tools from within our apps. We also follow high security standards to ensure sensitive data is stored safely and securely on your device — never on our servers."
aboutHeadingImpact: "Our Impact"
aboutImpactText: |
  Our iOS and macOS apps have been downloaded over **14 million times**, with thousands of top-rated reviews on the App Store.

  We're here to keep building better software — one thoughtful update at a time.
aboutHeadingContact: "Contact Us"
aboutContactText: |
  Thanks for using our apps and supporting independent development. If you ever have ideas or questions, don't hesitate to [contact us](/contact).

